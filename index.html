const PRAZO_PADRAO_MESES = 420;                    // 35 anos
const PRAZO_MIN_VIAVEL_MESES = 60;                 // 5 anos: abaixo disso, alerta

function formatBRL(v){
  return v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function formatBRLCurto(v){
  if (v >= 1000) return (v/1000).toLocaleString('pt-BR',{maximumFractionDigits:1}) + ' mil';
  return v.toLocaleString('pt-BR',{maximumFractionDigits:0});
}

function onlyDigits(s){ return (s||'').replace(/\D/g,''); }

function formatPhone(digits){
  digits = onlyDigits(digits);
  if (digits.length === 0) return '';
  if (digits.length <= 2) return '(' + digits;
  if (digits.length <= 7) return '(' + digits.slice(0,2) + ') ' + digits.slice(2);
  if (digits.length <= 11) return '(' + digits.slice(0,2) + ') ' + digits.slice(2,7) + '-' + digits.slice(7);
  return '(' + digits.slice(0,2) + ') ' + digits.slice(2,7) + '-' + digits.slice(7,11);
}

function formatRenda(digits){
  digits = onlyDigits(digits);
  if (!digits) return '';
  const n = parseInt(digits,10);
  return n.toLocaleString('pt-BR');
}

function buscarLinhaTabela(tabela, renda){
  // Acha o item com renda mais próxima (≤ renda informada)
  let melhor = null;
  for (const item of tabela){
    if (item.r <= renda) melhor = item;
    else break;
  }
  // Se renda for menor que a primeira (ex: 1200), usa a primeira (1500)
  if (!melhor) melhor = tabela[0];
  return melhor;
}

/**
 * Calcula o prazo máximo de financiamento pela idade (regra Caixa).
 * Idade ao final do contrato não pode ultrapassar 80 anos e 2 meses.
 * Aproximação: usa só o ano de nascimento (assume fim do ano corrente).
 */
function calcularPrazoMaxPorIdade(anoNasc){
  const anoAtual = new Date().getFullYear();
  // idade aproximada em meses (usando só o ano, assume mês 0)
  const idadeMeses = (anoAtual - anoNasc) * 12;
  const prazoMax = IDADE_MAX_FIM_CONTRATO_MESES - idadeMeses;
  return Math.max(0, prazoMax);
}

/**
 * Ajusta o financiamento quando o prazo é menor que 420 meses.
 * Mantém a parcela fixa (regra Caixa: parcela ≤ 30% renda).
 * Aplica fator PRICE: PV = PMT × [1 - (1+i)^-n] / i
 * Retorna {financ, prazoUsado}.
 */
function ajustarFinanciamentoPorPrazo(linha, prazoMaxMeses){
  if (prazoMaxMeses >= PRAZO_PADRAO_MESES){
    return {financ: linha.f, prazoUsado: PRAZO_PADRAO_MESES, ajustado: false};
  }
  if (prazoMaxMeses <= 0){
    return {financ: 0, prazoUsado: 0, ajustado: true};
  }
  // Taxa mensal a partir da anual (juros compostos)
  const taxaAnual = linha.t / 100;
  const iMensal = Math.pow(1 + taxaAnual, 1/12) - 1;

  // Fator PRICE para os dois prazos
  const fatorNovo = (1 - Math.pow(1 + iMensal, -prazoMaxMeses)) / iMensal;
  const fator420  = (1 - Math.pow(1 + iMensal, -PRAZO_PADRAO_MESES)) / iMensal;

  // Novo financiamento proporcional
  const financAjustado = linha.f * (fatorNovo / fator420);
  return {financ: financAjustado, prazoUsado: prazoMaxMeses, ajustado: true};
}

function calcular(){
  // Decide qual tabela usar
  let linha, chave, imovelMax;

  if (state.renda >= 10000){
    state.classeAlta = true;
    linha = buscarLinhaTabela(TABELA.classe_media, Math.min(state.renda, 13000));
    chave = 'classe_media';
    imovelMax = 600000;
  } else {
    if (state.cotista && state.dependente) chave = 'cotista_com_dep';
    else if (state.cotista && !state.dependente) chave = 'cotista_sem_dep';
    else if (!state.cotista && state.dependente) chave = 'nao_cotista_com_dep';
    else chave = 'nao_cotista_sem_dep';

    linha = buscarLinhaTabela(TABELA[chave], state.renda);
    // Teto do imóvel: até R$4.000 de renda = R$260mil, acima = R$400mil
    imovelMax = state.renda <= 4000 ? 260000 : 400000;
  }

  // Aplica ajuste por idade
  const prazoMax = calcularPrazoMaxPorIdade(state.anoNasc);
  const ajuste = ajustarFinanciamentoPorPrazo(linha, prazoMax);

  // Cria uma cópia da linha com o financiamento ajustado
  const linhaAjustada = {
    ...linha,
    f: ajuste.financ,
    fOriginal: linha.f, // guarda o original pra mostrar a diferença se houver
  };

  return {
    linha: linhaAjustada,
    tabelaUsada: chave,
    imovelMax,
    prazoUsado: ajuste.prazoUsado,
    prazoAjustado: ajuste.ajustado,
    idadeAtual: new Date().getFullYear() - state.anoNasc,
  };
}

function init(){
  const params = new URLSearchParams(window.location.search);
  const w = onlyDigits(params.get('w') || '');
  const n = params.get('n') || '';

  // A ferramenta é do Marco Túlio: quem abrir já cai direto na simulação
  // e o WhatsApp final sempre vai pra ele. Links antigos de parceiro
  // (?w=outro número) continuam funcionando e direcionam pra esse número.
  if (w && w.length >= 10 && w !== SUPORTE_PHONE){
    state.corretorPhone = w;
    state.corretorName = n || SUPORTE_NAME;
    state.modoSuporte = false;
  } else {
    state.corretorPhone = SUPORTE_PHONE;
    state.corretorName = SUPORTE_NAME;
    state.modoSuporte = true;
  }

  state.mode = 'cliente';
  state.step = 0;
  renderCliente();
}

function renderCliente(){
  const progress = Array.from({length: STEPS_TOTAL}, (_, i) => {
    // No modo rápido o passo do nome é pulado, então já entra como concluído.
    const skippedNome = state.quick && i === 0;
    if (i < state.step || skippedNome) return '<div class="progress-step done"></div>';
    if (i === state.step) return '<div class="progress-step current"></div>';
    return '<div class="progress-step"></div>';
  }).join('');

  let content;
  if (state.step === 0) content = stepNome();
  else if (state.step === 1) content = stepAnoNasc();
  else if (state.step === 2) content = stepRenda();
  else if (state.step === 3) content = stepCotista();
  else if (state.step === 4) content = stepDependente();
  else content = stepResultado();

  // Marca: por padrão é o Marco Túlio (dono da ferramenta). Se o visitante
  // chegou por um link antigo de parceiro, mostra o nome do parceiro.
  const brandName = state.modoSuporte ? 'Marco Túlio' : (state.corretorName || 'Corretor parceiro');
  const brandMark = (brandName.trim()[0] || 'M').toUpperCase();
  const brandSub = state.modoSuporte ? 'Simulador MCMV · Uberlândia' : 'Simulação MCMV · Caixa';

  // Botão flutuante de simulação rápida (some na tela de resultado).
  const showFab = state.step < STEPS_TOTAL;

  document.getElementById('app').innerHTML = `
    <div class="brand fade-in">
      <div class="brand-mark">${brandMark}</div>
      <div>
        <div class="brand-name">${brandName}</div>
        <div class="brand-sub">${brandSub}</div>
      </div>
    </div>

    ${state.step < STEPS_TOTAL ? `<div class="progress">${progress}</div>` : ''}

    <div class="card fade-in" key="step-${state.step}">
      ${content}
    </div>

    <div class="foot">
      Tabela MCMV 04/2026 · Imóvel na planta · até 420 meses · Uberlândia/MG<br>
      <small>Valores aproximados. Análise definitiva pela Caixa Econômica Federal.</small>
    </div>

    ${showFab ? `
    <button class="quick-fab" data-action="quick-sim" title="Começar uma simulação sem digitar nome">
      <span class="bolt">⚡</span> Simulação rápida
    </button>` : ''}
  `;

  attachStepListeners();
}

function stepNome(){
  return `
    <span class="badge">Minha Casa Minha Vida · Caixa</span>
    <h1 class="display">Descubra em 1 minuto quanto você pode financiar.</h1>
    <p class="lead">Responda 4 perguntas e veja na hora o valor do financiamento, o subsídio que a Caixa te dá e quanto fica a parcela. De graça e sem cadastro.</p>

    <div class="trust-row">
      <span class="trust-pill"><span class="ico">⏱</span> Leva 1 minuto</span>
      <span class="trust-pill"><span class="ico">🎁</span> Mostra seu subsídio</span>
      <span class="trust-pill"><span class="ico">🔒</span> Sem cadastro</span>
    </div>

    <div style="margin-bottom:20px;">
      <label for="nomeCli">Como posso te chamar?</label>
      <input type="text" id="nomeCli" placeholder="Seu primeiro nome" value="${state.nome}" autocomplete="given-name" autofocus />
    </div>

    <button class="btn btn-primary" data-action="next-nome">Começar simulação →</button>

    <button class="share-inline" data-action="share">Conhece alguém querendo a casa própria? Indique →</button>
  `;
}

function stepAnoNasc(){
  const anoAtual = new Date().getFullYear();
  return `
    <h2 class="display">${state.nome ? `Prazer, ${state.nome}!` : 'Beleza.'}<br>Em que ano você nasceu?</h2>
    <p class="lead">A Caixa financia até os <strong>80 anos e 2 meses</strong> de idade. Pela sua idade eu calculo o prazo certo do contrato.</p>

    <div style="margin-bottom:20px;">
      <label for="anoNascCli">Ano de nascimento</label>
      <input type="tel" id="anoNascCli" placeholder="${anoAtual - 35}" value="${state.anoNasc || ''}" inputmode="numeric" maxlength="4" autofocus />
      <div class="hint">4 dígitos. Ex: 1985</div>
      <div id="idadePreview" style="margin-top:8px;font-size:13px;color:var(--gold-dark);font-weight:600;"></div>
    </div>

    <div class="step-nav">
      <button class="btn btn-ghost" data-action="back">← Voltar</button>
      <button class="btn btn-primary" data-action="next-ano" ${state.anoNasc ? '' : 'disabled'}>Próximo →</button>
    </div>
  `;
}

function stepRenda(){
  return `
    <h2 class="display">${state.nome ? `Beleza, ${state.nome}.` : 'Beleza.'}<br>Qual a renda da sua família?</h2>
    <p class="lead">Some sua renda + de quem vai entrar no financiamento (cônjuge, pai, mãe, irmão). É o valor bruto, antes dos descontos.</p>

    <div style="margin-bottom:20px;">
      <label for="rendaCli">Renda familiar mensal (R$)</label>
      <input type="tel" id="rendaCli" placeholder="3.500" value="${state.renda ? state.renda.toLocaleString('pt-BR') : ''}" inputmode="numeric" autofocus />
      <div class="hint">Use só números. Ex: 3500</div>
    </div>

    <div class="step-nav">
      <button class="btn btn-ghost" data-action="back">← Voltar</button>
      <button class="btn btn-primary" data-action="next-renda">Próximo →</button>
    </div>
  `;
}

function stepCotista(){
  return `
    <h2 class="display">Você tem FGTS<br>com mais de 3 anos?</h2>
    <p class="lead">Conta carteira assinada por <strong>36 meses ou mais</strong> (somando todos os empregos da vida). Quem tem, paga juros mais baixos.</p>

    <div class="choices" style="margin-bottom:20px;">
      <div class="choice ${state.cotista === true ? 'active' : ''}" data-cotista="true">
        Sim, tenho<small>+ de 3 anos de carteira</small>
      </div>
      <div class="choice ${state.cotista === false ? 'active' : ''}" data-cotista="false">
        Não tenho<small>Nunca tive ou foi pouco tempo</small>
      </div>
    </div>

    <div class="step-nav">
      <button class="btn btn-ghost" data-action="back">← Voltar</button>
      <button class="btn btn-primary" data-action="next-cotista" ${state.cotista === null ? 'disabled' : ''}>Próximo →</button>
    </div>
  `;
}

function stepDependente(){
  return `
    <h2 class="display">Tem filhos<br>ou dependentes?</h2>
    <p class="lead">Filho, enteado ou outro dependente declarado no Imposto de Renda. Com dependente o <strong>subsídio é bem maior</strong>.</p>

    <div class="choices" style="margin-bottom:20px;">
      <div class="choice ${state.dependente === true ? 'active' : ''}" data-dep="true">
        Sim, tenho<small>Aumenta o subsídio</small>
      </div>
      <div class="choice ${state.dependente === false ? 'active' : ''}" data-dep="false">
        Não tenho<small>Subsídio menor</small>
      </div>
    </div>

    <div class="step-nav">
      <button class="btn btn-ghost" data-action="back">← Voltar</button>
      <button class="btn btn-primary" data-action="ver-resultado" ${state.dependente === null ? 'disabled' : ''}>Ver resultado →</button>
    </div>
  `;
}

function stepResultado(){
  const r = calcular();
  const linha = r.linha;
  const imovelMax = r.imovelMax;
  const totalCompra = linha.f + linha.s;
  const entradaMin = Math.max(0, imovelMax - totalCompra);

  // Caso especial: idade não permite financiar
  if (r.prazoUsado <= 0){
    return `
      <div class="result-hero" style="background:linear-gradient(135deg, var(--danger) 0%, #b91c1c 100%);">
        <div class="label" style="color:#fff;">Não foi possível simular</div>
        <div class="value" style="font-size:24px;">Idade fora da regra Caixa</div>
        <div class="sub">${r.idadeAtual} anos completados em ${new Date().getFullYear()}</div>
      </div>
      <div class="summary">
        Pela regra da Caixa, o contrato precisa ser quitado até os <strong>80 anos e 2 meses</strong> do tomador. Com sua idade atual, isso deixaria menos de 0 meses pra pagar — o que inviabiliza o financiamento direto.
        <br><br>
        <strong>Saída comum:</strong> trazer um <strong>2º proponente</strong> mais novo (cônjuge, filho maior, irmão) com renda comprovada. Aí a Caixa usa a idade do mais novo pra calcular o prazo.
      </div>
      <a href="https://wa.me/${state.corretorPhone}?text=${encodeURIComponent(`Oi! Tentei simular mas minha idade não bate na regra da Caixa (${r.idadeAtual} anos). Como faço com 2º proponente?`)}" target="_blank" rel="noopener" class="btn btn-whats">
        💬 Falar com o corretor
      </a>
      <button class="restart" data-action="reset">← Refazer com outros dados</button>
    `;
  }

  const anosPrazo = Math.floor(r.prazoUsado / 12);
  const mesesExtras = r.prazoUsado % 12;
  const prazoLabel = r.prazoUsado >= PRAZO_PADRAO_MESES
    ? '35 anos (420x)'
    : `${anosPrazo}${mesesExtras ? ' anos e ' + mesesExtras + ' meses' : ' anos'} (${r.prazoUsado}x)`;

  // monta mensagem do WhatsApp — varia conforme modo (corretor parceiro ou suporte direto)
  const partes = [];
  if (state.modoSuporte){
    partes.push(`Oi Marco! Acabei de fazer a simulação no seu site e queria tirar uma dúvida.`);
    if (state.nome) partes.push(`\nMeu nome é ${state.nome}.`);
  } else {
    partes.push(`Oi ${state.corretorName ? state.corretorName.split(' ')[0] : ''}! Fiz a simulação MCMV no site.`);
    if (state.nome) partes.push(`\nMeu nome é ${state.nome}.`);
  }
  partes.push(`\n\n*Meu perfil:*`);
  partes.push(`• Idade: ${r.idadeAtual} anos`);
  partes.push(`• Renda familiar: R$ ${state.renda.toLocaleString('pt-BR')}`);
  if (!state.classeAlta){
    partes.push(`• FGTS +3 anos: ${state.cotista ? 'Sim' : 'Não'}`);
    partes.push(`• Dependente: ${state.dependente ? 'Sim' : 'Não'}`);
  }
  partes.push(`\n*Resultado da simulação:*`);
  partes.push(`💰 Financiamento: R$ ${formatBRL(linha.f)}`);
  if (linha.s > 0) partes.push(`🎁 Subsídio Caixa: R$ ${formatBRL(linha.s)}`);
  partes.push(`📅 Parcela: R$ ${formatBRL(linha.p)}`);
  partes.push(`⏱ Prazo: ${prazoLabel}`);
  partes.push(`📊 Taxa: ${linha.t.toString().replace('.',',')}% ao ano`);
  partes.push(`🏠 Imóvel até: R$ ${formatBRLCurto(imovelMax)}`);
  if (state.modoSuporte){
    partes.push(`\nPode me ajudar com os próximos passos?`);
  } else {
    partes.push(`\nQuero falar sobre os imóveis disponíveis. Pode me passar as opções?`);
  }

  const msgWhats = partes.join('\n').replace(/\n+/g,'\n');
  const linkWhats = `https://wa.me/${state.corretorPhone}?text=${encodeURIComponent(msgWhats)}`;

  let perfilLabel = '';
  if (state.classeAlta) perfilLabel = 'Classe Média — sem subsídio MCMV';
  else {
    const cot = state.cotista ? 'Cotista FGTS' : 'Não cotista';
    const dep = state.dependente ? 'com dependente' : 'sem dependente';
    perfilLabel = `${cot} · ${dep}`;
  }

  // Alerta caso o prazo tenha sido reduzido por idade
  const alertaPrazo = r.prazoAjustado ? `
    <div class="summary" style="border-left:3px solid var(--gold);background:#fff8e1;">
      ⚠️ <strong>Prazo reduzido pela idade.</strong> Como você tem ${r.idadeAtual} anos, a Caixa só pode financiar por ${prazoLabel} (em vez dos 35 anos). Isso reduziu o valor que você pode tomar de R$ ${formatBRL(linha.fOriginal)} para R$ ${formatBRL(linha.f)}.
      <br><br>
      <strong>Quer aumentar?</strong> Inclua um 2º proponente mais novo (cônjuge, filho ou parente com renda).
    </div>
  ` : '';

  // Label do CTA varia conforme modo
  const ctaLabelTop = state.modoSuporte
    ? '💬 Falar com Marco Túlio'
    : `💬 Mandar resultado pro ${state.corretorName ? state.corretorName.split(' ')[0] : 'corretor'}`;
  const ctaSubTop = state.modoSuporte
    ? 'Tire suas dúvidas direto no WhatsApp'
    : 'Receba as opções de imóveis no WhatsApp';

  return `
    <div class="result-hero">
      <div class="label">Você pode financiar até</div>
      <div class="value"><span class="currency">R$</span>${formatBRL(linha.f)}</div>
      <div class="sub">${perfilLabel} · ${prazoLabel}</div>

      <a href="${linkWhats}" target="_blank" rel="noopener" class="hero-cta">
        ${ctaLabelTop}
      </a>
      <span class="hero-cta-sub">${ctaSubTop}</span>
    </div>

    <div class="result-grid">
      ${linha.s > 0 ? `
      <div class="result-item highlight">
        <div class="label">🎁 Subsídio Caixa</div>
        <div class="value">R$ ${formatBRL(linha.s)}</div>
      </div>` : `
      <div class="result-item">
        <div class="label">🎁 Subsídio</div>
        <div class="value">—</div>
      </div>`}

      <div class="result-item">
        <div class="label">📅 Parcela mensal</div>
        <div class="value">R$ ${formatBRL(linha.p)}</div>
      </div>

      <div class="result-item">
        <div class="label">📊 Taxa de juros</div>
        <div class="value">${linha.t.toString().replace('.',',')}% a.a.</div>
      </div>

      <div class="result-item">
        <div class="label">🏠 Imóvel até</div>
        <div class="value">R$ ${formatBRLCurto(imovelMax)}</div>
      </div>
    </div>

    ${alertaPrazo}

    <div class="summary">
      <strong>Resumo:</strong> Com sua renda de R$ ${state.renda.toLocaleString('pt-BR')} e ${r.idadeAtual} anos, ${linha.s > 0 ? `você ganha um subsídio de <strong>R$ ${formatBRL(linha.s)}</strong> da Caixa que não precisa devolver. ` : ''}Somando financiamento + subsídio, você compra um imóvel de até <strong>R$ ${formatBRLCurto(totalCompra)}</strong>${entradaMin > 0 ? ` (com entrada de ~R$ ${formatBRLCurto(entradaMin)} pra chegar no teto de R$ ${formatBRLCurto(imovelMax)})` : ''}.
    </div>

    <div style="margin:20px 0 8px;font-size:13px;font-weight:600;color:var(--navy);">
      💬 ${state.modoSuporte ? 'Mande essa simulação pro corretor:' : 'Próximo passo — mandar pro corretor:'}
    </div>
    <div class="whats-preview">${msgWhats}</div>

    <a href="${linkWhats}" target="_blank" rel="noopener" class="btn btn-whats" id="abrirWhats">
      💬 Falar agora no WhatsApp
    </a>

    <div class="note">
      ⚠️ Valores aproximados baseados na tabela Caixa de 04/2026 (imóvel na planta, prazo padrão de 420 meses). Para idades mais altas o prazo é ajustado proporcionalmente. A análise definitiva é feita pelo banco com sua documentação. O subsídio depende de não ter outro imóvel financiado pelo SFH.
    </div>

    <div class="share-block">
      <h3>Curtiu? Manda pra um amigo 💛</h3>
      <p>Quem está pensando em comprar a casa própria vai gostar de descobrir o número dele também.</p>
      <button class="btn btn-share" data-action="share">📲 Indicar para um amigo</button>
      <div class="raffle-teaser"><span class="spark">🎉</span> Em breve: indique e concorra a prêmios</div>
    </div>

    <button class="restart" data-action="reset">← Refazer simulação</button>
  `;
}

/* =====================================================================
   LISTENERS DOS STEPS
   ===================================================================== */

function attachStepListeners(){
  // Step 0 - nome
  const btnNome = document.querySelector('[data-action="next-nome"]');
  if (btnNome){
    const inputNome = document.getElementById('nomeCli');
    inputNome.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnNome.click();
    });
    btnNome.addEventListener('click', () => {
      state.nome = inputNome.value.trim();
      state.step = 1;
      renderCliente();
    });
  }

  // Step 1 - ano de nascimento
  const btnAno = document.querySelector('[data-action="next-ano"]');
  if (btnAno){
    const inputAno = document.getElementById('anoNascCli');
    const previewEl = document.getElementById('idadePreview');
    const anoAtual = new Date().getFullYear();

    const atualizarPreview = () => {
      const ano = parseInt(onlyDigits(inputAno.value), 10);
      if (!ano || ano < 1925 || ano > anoAtual - 18){
        previewEl.textContent = '';
        previewEl.style.color = 'var(--gold-dark)';
        btnAno.disabled = true;
        return;
      }
      const idade = anoAtual - ano;
      const prazoMax = calcularPrazoMaxPorIdade(ano);
      const anosPrazo = Math.floor(prazoMax / 12);
      const mesesExtras = prazoMax % 12;

      btnAno.disabled = false;

      if (prazoMax <= 0){
        previewEl.textContent = `⚠️ Com ${idade} anos, pela regra da Caixa não dá pra financiar.`;
        previewEl.style.color = 'var(--danger)';
        btnAno.disabled = true;
        return;
      }
      if (prazoMax >= PRAZO_PADRAO_MESES){
        previewEl.textContent = `✓ ${idade} anos — prazo cheio de 35 anos (420x)`;
        previewEl.style.color = 'var(--success)';
      } else {
        previewEl.innerHTML = `⚠️ ${idade} anos — prazo limitado a <strong>${anosPrazo} anos${mesesExtras ? ` e ${mesesExtras} meses` : ''}</strong> (${prazoMax}x). O financiamento será menor.`;
        previewEl.style.color = 'var(--gold-dark)';
      }
    };

    inputAno.addEventListener('input', e => {
      e.target.value = onlyDigits(e.target.value).slice(0,4);
      atualizarPreview();
    });
    inputAno.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !btnAno.disabled) btnAno.click();
    });

    if (state.anoNasc) atualizarPreview();
    else btnAno.disabled = true;

    btnAno.addEventListener('click', () => {
      const ano = parseInt(onlyDigits(inputAno.value), 10);
      if (!ano || ano < 1925 || ano > anoAtual - 18){
        inputAno.classList.add('shake');
        setTimeout(()=>inputAno.classList.remove('shake'), 400);
        return;
      }
      state.anoNasc = ano;
      state.step = 2;
      renderCliente();
    });
  }

  // Step 2 - renda
  const btnRenda = document.querySelector('[data-action="next-renda"]');
  if (btnRenda){
    const inputRenda = document.getElementById('rendaCli');
    inputRenda.addEventListener('input', e => {
      e.target.value = formatRenda(e.target.value);
    });
    inputRenda.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnRenda.click();
    });
    btnRenda.addEventListener('click', () => {
      const renda = parseInt(onlyDigits(inputRenda.value), 10);
      if (!renda || renda < 1000){
        inputRenda.classList.add('shake');
        setTimeout(()=>inputRenda.classList.remove('shake'), 400);
        return;
      }
      state.renda = renda;
      // Se renda >= 10k, pula direto pro resultado (classe média)
      if (renda >= 10000){
        state.classeAlta = true;
        state.step = STEPS_TOTAL;
      } else {
        state.step = 3;
      }
      renderCliente();
    });
  }

  // Step 3 - cotista
  document.querySelectorAll('[data-cotista]').forEach(el => {
    el.addEventListener('click', () => {
      state.cotista = el.dataset.cotista === 'true';
      document.querySelectorAll('[data-cotista]').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      document.querySelector('[data-action="next-cotista"]').disabled = false;
    });
  });
  const btnCotista = document.querySelector('[data-action="next-cotista"]');
  if (btnCotista){
    btnCotista.addEventListener('click', () => {
      if (state.cotista === null) return;
      state.step = 4;
      renderCliente();
    });
  }

  // Step 4 - dependente
  document.querySelectorAll('[data-dep]').forEach(el => {
    el.addEventListener('click', () => {
      state.dependente = el.dataset.dep === 'true';
      document.querySelectorAll('[data-dep]').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      document.querySelector('[data-action="ver-resultado"]').disabled = false;
    });
  });
  const btnVer = document.querySelector('[data-action="ver-resultado"]');
  if (btnVer){
    btnVer.addEventListener('click', () => {
      if (state.dependente === null) return;
      state.step = STEPS_TOTAL;
      renderCliente();
    });
  }

  // Voltar
  document.querySelectorAll('[data-action="back"]').forEach(el => {
    el.addEventListener('click', () => {
      if (state.step > 0){
        state.step -= 1;
        renderCliente();
      }
    });
  });

  // Reset
  const btnReset = document.querySelector('[data-action="reset"]');
  if (btnReset){
    btnReset.addEventListener('click', () => {
      state.step = 0;
      state.nome = '';
      state.anoNasc = null;
      state.cotista = null;
      state.dependente = null;
      state.renda = null;
      state.classeAlta = false;
      state.quick = false;
      renderCliente();
    });
  }

  // Botão flutuante — simulação rápida (zera tudo e pula o nome)
  const btnQuick = document.querySelector('[data-action="quick-sim"]');
  if (btnQuick){
    btnQuick.addEventListener('click', () => {
      state.nome = '';
      state.anoNasc = null;
      state.cotista = null;
      state.dependente = null;
      state.renda = null;
      state.classeAlta = false;
      state.quick = true;
      state.step = 1;   // pula direto pro ano de nascimento
      renderCliente();
    });
  }

  // Indicar para um amigo (aparece na abertura e no resultado)
  document.querySelectorAll('[data-action="share"]').forEach(el => {
    el.addEventListener('click', shareToFriend);
  });
}

// Inicializa
init();
</script>
</body>
</html>
